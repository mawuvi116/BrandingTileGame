<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Identity Game</title>
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="desktop-1-1">

    <!-- Pool of draggable tiles (exactly as in your Figma, now draggable) -->
    <div class="pool" id="item-pool">
        <div class="draggable-tile" draggable="true" id="item-logo" data-category="visual">
            <p class="text-22"><span class="text-rgb-212-21-63">Logo</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-graphic" data-category="visual">
            <p class="text-24"><span class="text-rgb-212-21-63">Graphic Assets</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-typography" data-category="visual">
            <p class="text-26"><span class="text-rgb-212-21-63">Typography</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-photography" data-category="visual">
            <p class="text-28"><span class="text-rgb-212-21-63">Photography</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-tone" data-category="brandidentity">
            <p class="text-30"><span class="text-rgb-212-21-63">Tone of Voice</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-values" data-category="brandidentity">
            <p class="text-32"><span class="text-rgb-212-21-63">Values</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-story" data-category="brandidentity">
            <p class="text-34"><span class="text-rgb-212-21-63">Brand Story</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-communication" data-category="brandidentity">
            <p class="text-36"><span class="text-rgb-212-21-63">Communication</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-layout" data-category="visual">
            <p class="text-38"><span class="text-rgb-212-21-63">Layout</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-color" data-category="visual">
            <p class="text-40"><span class="text-rgb-212-21-63">Color Palette</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-personality" data-category="brandidentity">
            <p class="text-42"><span class="text-rgb-212-21-63">Personality</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-patterns" data-category="visual">
            <p class="text-44"><span class="text-rgb-212-21-63">Patterns</span></p>
        </div>
        <div class="draggable-tile" draggable="true" id="item-messaging" data-category="brandidentity">
            <p class="text-46"><span class="text-rgb-212-21-63">Messaging</span></p>
        </div>
    </div>

    <!-- The Brand zone -->
    <div class="the-brand-vessel-2 dropzone" id="zone-brand">
        <p class="text-3"><span class="text-white">The Brand</span></p>
        <div class="zone-items"></div>
    </div>

    <!-- Brand Identity zone -->
    <div class="node-4 dropzone" id="zone-brandidentity">
        <p class="text-11"><span class="text-rgb-212-21-63">Brand Identity</span></p>
        <div class="zone-items"></div>
    </div>

    <!-- Visual Identity zone -->
    <div class="node-12 dropzone" id="zone-visual">
        <p class="text-20"><span class="text-rgb-212-21-63">Visual Identity</span></p>
        <div class="zone-items"></div>
    </div>

    <!-- Control buttons -->
    <div class="controls">
        <button id="checkBtn">✅ Check Answers</button>
        <button id="resetBtn">🔄 Reset</button>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
