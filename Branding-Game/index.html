<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Branding Tile Game</title>
  <link href="https://fonts.googleapis.com/css?family=Inter|Montserrat:400,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="desktop-1-1">
  <!-- The Brand (outermost) -->
  <div class="the-brand-vessel-2" id="zone-brand">
    <p class="text-3"><span class="text-white">The Brand</span></p>

    <!-- Brand Identity container (nested) -->
    <div class="node-4" id="zone-brandidentity">
      <p class="text-11"><span class="text-rgb-212-21-63">Brand Identity</span></p>

      <!-- Two‑column content row -->
      <div class="brandidentity-content">
        <!-- Left column holds Visual Identity -->
        <div class="left-col">
          <div class="node-12" id="zone-visual">
            <p class="text-20"><span class="text-rgb-212-21-63">Visual Identity</span></p>
            <div class="slots-container visual-slots">
              <div class="node-13 slot" data-zone="visual"></div>
              <div class="node-14 slot" data-zone="visual"></div>
              <div class="node-15 slot" data-zone="visual"></div>
              <div class="node-16 slot" data-zone="visual"></div>
              <div class="node-17 slot" data-zone="visual"></div>
              <div class="node-18 slot" data-zone="visual"></div>
              <div class="node-19 slot" data-zone="visual"></div>
            </div>
          </div>
        </div>

        <!-- Right column holds Brand Identity slots -->
        <div class="right-col">
          <div class="slots-container brandidentity-slots">
            <div class="node-5 slot" data-zone="brandidentity"></div>
            <div class="node-6 slot" data-zone="brandidentity"></div>
            <div class="node-7 slot" data-zone="brandidentity"></div>
            <div class="node-8 slot" data-zone="brandidentity"></div>
            <div class="node-9 slot" data-zone="brandidentity"></div>
            <div class="node-10 slot" data-zone="brandidentity"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Draggable tiles pool -->
  <div class="pool" id="item-pool">
    <div class="draggable-tile" draggable="true" id="tile-logo" data-category="visual">Logo</div>
    <div class="draggable-tile" draggable="true" id="tile-graphic" data-category="visual">Graphic Assets</div>
    <div class="draggable-tile" draggable="true" id="tile-typography" data-category="visual">Typography</div>
    <div class="draggable-tile" draggable="true" id="tile-photography" data-category="visual">Photography</div>
    <div class="draggable-tile" draggable="true" id="tile-tone" data-category="brandidentity">Tone of Voice</div>
    <div class="draggable-tile" draggable="true" id="tile-values" data-category="brandidentity">Values</div>
    <div class="draggable-tile" draggable="true" id="tile-story" data-category="brandidentity">Brand Story</div>
    <div class="draggable-tile" draggable="true" id="tile-communication" data-category="brandidentity">Communication</div>
    <div class="draggable-tile" draggable="true" id="tile-layout" data-category="visual">Layout</div>
    <div class="draggable-tile" draggable="true" id="tile-color" data-category="visual">Color Palette</div>
    <div class="draggable-tile" draggable="true" id="tile-personality" data-category="brandidentity">Personality</div>
    <div class="draggable-tile" draggable="true" id="tile-patterns" data-category="visual">Patterns</div>
    <div class="draggable-tile" draggable="true" id="tile-messaging" data-category="brandidentity">Messaging</div>
  </div>

  <!-- Controls with new button text -->
  <div class="controls">
    <button id="checkBtn">CHECK ANSWERS</button>
    <button id="resetBtn">RESET</button>
  </div>

  <!-- Result Modal -->
  <div id="result-modal" class="modal">
    <div class="modal-content">
      <p id="score-message"></p>
      <button id="tryAgainBtn">Try Again</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
